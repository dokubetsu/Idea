name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/api/requirements.txt
        pip install -r apps/api/requirements-dev.txt

    - name: Run code formatting check (black)
      run: black --check apps/api/app apps/api/tests

    - name: Run lint checks (ruff)
      run: ruff check apps/api/app apps/api/tests

    - name: Run static type checking (mypy)
      run: mypy --ignore-missing-imports apps/api/app

    - name: Run dependency security audit (pip-audit)
      run: pip-audit

    - name: Setup local Supabase test database
      run: |
        # Start Supabase services locally using Docker
        npx supabase start
        # Retrieve credentials and set them to env variables for integration tests
        STATUS_JSON=$(npx supabase status -o json)
        echo "SUPABASE_TEST_PROJECT_URL=$(echo "$STATUS_JSON" | jq -r 'if .api | type == "object" then .api.url else .api end')" >> $GITHUB_ENV
        echo "SUPABASE_TEST_SERVICE_ROLE_KEY=$(echo "$STATUS_JSON" | jq -r 'if .api | type == "object" then .api.service_role_key else .service_role_key end')" >> $GITHUB_ENV

    - name: Run pytest tests (Unit & Integration)
      run: |
        export PYTHONPATH=apps/api
        pytest apps/api
      env:
        CRON_SECRET: ci-test-secret

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: apps/web/package-lock.json

    - name: Install npm dependencies
      run: npm --prefix apps/web ci

    - name: Run security audit (npm audit)
      run: npm --prefix apps/web audit --audit-level=high

    - name: Run type checking
      run: npm --prefix apps/web run type-check

    - name: Run linting
      run: npm --prefix apps/web run lint

    - name: Build web application
      run: npm --prefix apps/web run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
        NEXT_PUBLIC_API_URL: http://localhost:8000

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Trigger Render Deploy Hook
      env:
        RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK" ]; then
          echo "Triggering Render deployment..."
          curl -f -X GET "$RENDER_DEPLOY_HOOK"
        else
          echo "RENDER_DEPLOY_HOOK secret is not set. Skipping CD trigger."
        fi
