name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/api/requirements.txt

    - name: Run compilation check
      run: python -m compileall apps/api/app

    - name: Run pytest tests
      run: |
        export PYTHONPATH=apps/api
        pytest apps/api
      env:
        # CRON_SECRET is required (no default) to prevent hardcoded fallbacks in source.
        # A dummy value is fine for CI — real value lives in Render's environment config.
        CRON_SECRET: ci-test-secret

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: apps/web/package-lock.json

    - name: Install npm dependencies
      run: npm --prefix apps/web ci

    - name: Run type checking
      run: npm --prefix apps/web run type-check

    - name: Run linting
      run: npm --prefix apps/web run lint

    - name: Build web application
      run: npm --prefix apps/web run build
      env:
        # FIX B: Real project URL and anon key removed from source.
        # Add these as GitHub Actions secrets: Settings → Secrets → Actions
        #   NEXT_PUBLIC_SUPABASE_URL     → https://<your-ref>.supabase.co
        #   NEXT_PUBLIC_SUPABASE_ANON_KEY → eyJ...
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NEXT_PUBLIC_API_URL: http://localhost:8000
